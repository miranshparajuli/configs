[main]
font=Terminess Nerd Font:style=Bold:size=22
pad=19x19

[scrollback]
lines=5000

[url]
launch=xdg-open ${url}
label-letters=sadfjkl;egetwiter

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

[colors-dark]
alpha=0.6
background=000000
foreground=ffffff

regular0=1c1c1c          # black (dark grey background)
regular1=ff657a          # red (Identifier)
regular2=a6e22e          # green (String)
regular3=e6db74          # yellow (Constant/Number/Boolean)
regular4=66d9ef          # blue (Function/Type)
regular5=ae81ff          # magenta (Statement/Keyword/Conditional)
regular6=66d9ef          # cyan (Question prompt)
regular7=ffffff          # white (Operator text)

bright0=5c6370           # bright black (Comment Gray)
bright1=ff657a           # bright red
bright2=a6e22e           # bright green
bright3=e6db74           # bright yellow
bright4=66d9ef           # bright blue
bright5=ae81ff           # bright magenta
bright6=66d9ef           # bright cyan
bright7=ffffff           # bright white

selection-foreground=000000
selection-background=66d9ef
